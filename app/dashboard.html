<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성수동 문화시설 추천 대시보드</title>
  <style>
    :root {
      --white: #ffffff;
      --off-white: #f3f3f5;
      --light-gray: #ddddE2;
      --gray: #a8a8b1;
      --dark-gray: #44444c;
      --black: #101012;
      --silver: #c5c7cf;
      --shadow: rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: linear-gradient(145deg, #f6f6f8, #e7e8ec);
      color: var(--black);
      min-height: 100vh;
    }

    .container {
      width: min(980px, 92%);
      margin: 32px auto;
    }

    .title-wrap {
      text-align: center;
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--dark-gray);
      font-size: 0.98rem;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--light-gray);
      border-radius: 18px;
      box-shadow: 0 10px 24px var(--shadow);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #111114, var(--silver), #111114);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .section {
      margin-bottom: 24px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 1.08rem;
      color: var(--black);
    }

    .option-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .option-btn {
      border: 1px solid #d3d4da;
      background: #f8f8fa;
      color: var(--dark-gray);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .option-btn:hover {
      border-color: var(--dark-gray);
      background: #efeff3;
    }

    .option-btn.active {
      background: var(--black);
      border-color: var(--silver);
      color: var(--white);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.22);
    }

    .primary-btn,
    .secondary-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .primary-btn {
      background: linear-gradient(135deg, #0f0f11, #27272c);
      color: var(--white);
      width: 100%;
      margin-top: 4px;
      border: 1px solid #2f3035;
    }

    .primary-btn:hover {
      background: linear-gradient(135deg, #0b0b0d, #202025);
    }

    .secondary-btn {
      background: linear-gradient(135deg, #f0f0f3, #e6e7ec);
      color: var(--black);
      margin-top: 18px;
      width: 100%;
      border: 1px solid #d0d2d9;
    }

    .secondary-btn:hover {
      background: linear-gradient(135deg, #e7e8ed, #dddfe7);
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .result-header h2 {
      margin: 0;
      font-size: 1.4rem;
    }

    .profile-summary {
      color: var(--dark-gray);
      font-size: 0.92rem;
    }

    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .facility-card {
      background: linear-gradient(170deg, #fdfdfe, #f4f5f8);
      border: 1px solid #dddee4;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 12px rgba(16, 16, 18, 0.06);
    }

    .facility-name {
      margin: 0 0 6px;
      font-size: 1.04rem;
      color: var(--black);
    }

    .facility-type {
      margin: 0 0 12px;
      color: var(--dark-gray);
      font-size: 0.9rem;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.88rem;
      color: var(--dark-gray);
    }

    .bar-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e1e3e9;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7f828c, #111114);
    }

    .facility-info {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e0e1e7;
      font-size: 0.84rem;
      color: var(--dark-gray);
      display: grid;
      gap: 5px;
    }

    .warning {
      margin-top: 10px;
      color: #d63a3a;
      font-size: 0.9rem;
      min-height: 20px;
    }

    @media (max-width: 600px) {
      .panel {
        padding: 18px;
      }

      .title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

    </div>

        <div class="section" data-key="age">

          <div class="option-group">

            <button type="button" class="option-btn" data-value="30대">30대</button>

            <button type="button" class="option-btn" data-value="60대">60대</button>
          </div>
        </div>

        <div class="section" data-key="interest">
          <h3>관심사 선택</h3>
          <div class="option-group">
            <button type="button" class="option-btn" data-value="문화">문화</button>
            <button type="button" class="option-btn" data-value="여행">여행</button>
            <button type="button" class="option-btn" data-value="아웃도어">아웃도어</button>
            <button type="button" class="option-btn" data-value="디지털">디지털</button>
          </div>
        </div>

        <div class="section" data-key="visitTime">
          <h3>방문 시간 선택</h3>
          <div class="option-group">
            <button type="button" class="option-btn" data-value="오전">오전</button>
            <button type="button" class="option-btn" data-value="오후">오후</button>
            <button type="button" class="option-btn" data-value="저녁">저녁</button>
          </div>
        </div>

        <div class="section" data-key="budget">
          <h3>예산 선택</h3>
          <div class="option-group">
            <button type="button" class="option-btn" data-value="무료">무료</button>
            <button type="button" class="option-btn" data-value="1만원 이하">1만원 이하</button>
            <button type="button" class="option-btn" data-value="3만원 이하">3만원 이하</button>
            <button type="button" class="option-btn" data-value="3만원 이상">3만원 이상</button>
          </div>
        </div>

        <div class="section" data-key="companion">
          <h3>동행 선택</h3>
          <div class="option-group">
            <button type="button" class="option-btn" data-value="혼자">혼자</button>
            <button type="button" class="option-btn" data-value="친구와">친구와</button>
            <button type="button" class="option-btn" data-value="연인과">연인과</button>
            <button type="button" class="option-btn" data-value="가족과">가족과</button>
          </div>
        </div>

        <button id="recommendBtn" class="primary-btn" type="button">추천받기</button>
        <div id="warningText" class="warning"></div>
      </section>

      <section id="screenResult" class="screen">
        <div class="result-header">
          <h2>추천 결과 (상위 5개)</h2>
          <div id="profileSummary" class="profile-summary"></div>
        </div>
        <div id="cardList" class="card-list"></div>
        <button id="resetBtn" class="secondary-btn" type="button">다시 입력하기</button>
      </section>
    </div>
  </div>

          buttons.forEach((b) => b.classList.remove("active"));
          button.classList.add("active");

          warningText.textContent = "";
        });
      });
    });

    function normalize(value, min, max) {
      if (max === min) {
        return 1;
      }
      return (value - min) / (max - min);
    }

    function getGenderAgeRaw(facility, gender, age) {
      const male20 = facility["카드_남_20대비율"];
      const male30 = facility["카드_남_30대비율"];
      const female20 = facility["카드_여_20대비율"];
      const female30 = facility["카드_여_30대비율"];

      const ageWeightMap = {
        "20대": [1.0, 0.0],
        "30대": [0.0, 1.0],
        "40대": [0.3, 0.7],
        "50대": [0.5, 0.5],
        "60대": [0.7, 0.3]
      };

      const [w20, w30] = ageWeightMap[age] || [0.0, 1.0];

      if (gender === "남") {
        return male20 * w20 + male30 * w30;
      }
      return female20 * w20 + female30 * w30;
    }

    function getInterestRaw(facility, interest) {
      const keyMap = {
        "문화": "문화이벤트관심점수",
        "여행": "해외여행관심점수",
        "아웃도어": "아웃도어관심점수",
        "디지털": "디지털성향점수"
      };
      return facility[keyMap[interest]];
    }

    function getVisitTimeRaw(facility, visitTime) {
      const keyMap = {
        "오전": "시간_09_11비율",
        "오후": "시간_14_18비율",
        "저녁": "시간_18시비율"
      };
      return facility[keyMap[visitTime]];
    }

    function recommendFacilities() {
      const genderAgeValues = facilities.map((f) =>
        getGenderAgeRaw(f, selections.gender, selections.age)
      );
      const interestValues = facilities.map((f) =>
        getInterestRaw(f, selections.interest)
      );
      const visitTimeValues = facilities.map((f) =>
        getVisitTimeRaw(f, selections.visitTime)
      );

      const gaMin = Math.min(...genderAgeValues);
      const gaMax = Math.max(...genderAgeValues);
      const interestMin = Math.min(...interestValues);
      const interestMax = Math.max(...interestValues);
      const timeMin = Math.min(...visitTimeValues);
      const timeMax = Math.max(...visitTimeValues);

      return facilities
        .map((facility) => {
          const genderAgeRaw = getGenderAgeRaw(facility, selections.gender, selections.age);
          const interestRaw = getInterestRaw(facility, selections.interest);
          const visitTimeRaw = getVisitTimeRaw(facility, selections.visitTime);

          const genderAgeScore = normalize(genderAgeRaw, gaMin, gaMax) * 30;
          const interestScore = normalize(interestRaw, interestMin, interestMax) * 40;
          const visitTimeScore = normalize(visitTimeRaw, timeMin, timeMax) * 30;
          const totalScore = genderAgeScore + interestScore + visitTimeScore;

          return {
            name: facility["시설명"],
            category: facility["시설분류"],
            score: Math.round(totalScore)
          };
        })
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);
    }

    function renderResults(recommendedFacilities) {
      cardList.innerHTML = recommendedFacilities
        .map(
          (facility) => {
            const info = facilityDetails[facility.name] || {
              address: "정보 없음",
              hours: "정보 없음",
              feature: "정보 없음"
            };
            return `
            <article class="facility-card">
              <h3 class="facility-name">${facility.name}</h3>
              <p class="facility-type">시설분류: ${facility.category}</p>
              <div class="score-row">
                <span>추천 점수</span>
                <strong>${facility.score}점</strong>
              </div>
              <div class="bar-track">
                <div class="bar-fill" style="width: ${facility.score}%;"></div>
              </div>
              <div class="facility-info">
                <div>주소: ${info.address}</div>
                <div>운영시간: ${info.hours}</div>
                <div>특징: ${info.feature}</div>
              </div>
            </article>
          `;
          }
        )
        .join("");
    }

    function allSelected() {
      return Object.values(selections).every(Boolean);
    }

    recommendBtn.addEventListener("click", () => {
      if (!allSelected()) {
        warningText.textContent = "모든 항목을 선택한 뒤 추천받기를 눌러주세요.";
        return;
      }

      const recommendedFacilities = recommendFacilities();
      profileSummary.textContent = `${selections.gender} / ${selections.age} / ${selections.interest} / ${selections.visitTime} / ${selections.budget} / ${selections.companion} 기준`;
      renderResults(recommendedFacilities);
      inputScreen.classList.remove("active");
      resultScreen.classList.add("active");
    });

    resetBtn.addEventListener("click", () => {
      Object.keys(selections).forEach((key) => {
        selections[key] = "";
      });

      document.querySelectorAll(".option-btn").forEach((button) => {
        button.classList.remove("active");
      });

      warningText.textContent = "";
      resultScreen.classList.remove("active");
      inputScreen.classList.add("active");
    });
